<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>EMYRGEN — Brazil Climate Infrastructure · Investor Briefing</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="stage">
  <div class="viewport">
    <main class="phone" id="phone">
      <section class="scene active intro" id="introScene">
        <div class="bg intro-bg"></div>
        <div class="intro-glow"></div>
        <div class="vignette"></div>
        <div class="scan-line"></div>
        <div class="intro-center">
          <div class="intro-logo-wrap">
            <img class="intro-logo" src="assets/emyrgen_group_inc_logo.png" alt="EMYRGEN GROUP INC">
            <span class="intro-shine"></span>
          </div>
          <div class="intro-eyebrow">Investor Briefing · Capital Deployment</div>
          <h1 class="intro-title">Climate Operations Infrastructure</h1>
          <p class="intro-tag">AI-guided detection · Aerial execution · Audit-grade MRV · Monetized outcomes</p>
          <div class="intro-loader"><span></span></div>
        </div>
      </section>
    </main>
    <div class="controls-shell">
      <div class="progress"><span id="progressFill"></span></div>
      <nav class="controls">
        <button class="btn" id="prevBtn">Prev</button>
        <button class="btn primary" id="playBtn">Pause</button>
        <button class="btn" id="replayBtn">Replay</button>
        <button class="btn" id="nextBtn">Next</button>
      </nav>
    </div>
  </div>
</div>
<script src="app.js" defer></script>
</body>
</html>
